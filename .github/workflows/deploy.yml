name: Deploy to GitHub Pages

on:
  push:
    branches: ['master'] # Deploy on push to master branch
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --base-href /

      - name: Create 404 page
        run: cp dist/all-eyes-hostel/browser/index.html dist/all-eyes-hostel/browser/404.html

      - name: Set up SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Commit and push to gh-pages using SSH
        env:
          GIT_SSH_COMMAND: 'ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          cd dist/app/browser
          git init  # Initialize a new git repository
          git add --all .  # Add all changes
          git commit -m "Deploy to GitHub Pages"
          git checkout -B gh-pages  # Switch to gh-pages branch
          git push git@github.com:${{ github.repository }} gh-pages --force

      - name: Clean up SSH
        run: |
          rm -f ~/.ssh/id_rsa
          rm -f ~/.ssh/known_hosts
